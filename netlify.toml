[build]
  command = "npm install"
  publish = "."

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/fly/run/start"
  to = "/.netlify/functions/fly-run-start"
  status = 200

[[redirects]]
  from = "/api/fly/run/finish"
  to = "/.netlify/functions/fly-run-finish"
  status = 200

[[redirects]]
  from = "/api/fly/run/ping"
  to = "/.netlify/functions/fly-run-ping"
  status = 200

[[redirects]]
  from = "/api/fly/leaderboard"
  to = "/.netlify/functions/fly-leaderboard"
  status = 200

[[redirects]]
  from = "/api/fly/player"
  to = "/.netlify/functions/fly-player-profile"
  status = 200

[[redirects]]
  from = "/api/fly/admin/flush"
  to = "/.netlify/functions/fly-admin-flush"
  status = 200

[[redirects]]
  from = "/api/fly/admin/import-run"
  to = "/.netlify/functions/fly-admin-import-run"
  status = 200

[[redirects]]
  from = "/api/fly/admin/player"
  to = "/.netlify/functions/fly-admin-player"
  status = 200

[[redirects]]
  from = "/api/fly/admin/data"
  to = "/.netlify/functions/fly-admin-data"
  status = 200

[[headers]]
  for = "/*.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "text/javascript"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/fly-session-guard.js"
  [headers.values]
    Content-Type = "text/javascript"
    Cache-Control = "no-store"

[[headers]]
  for = "/app.js"
  [headers.values]
    Content-Type = "text/javascript"
    Cache-Control = "no-store"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/countries.geo.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/country-boundaries.geo.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/rocket-countries.json"
  [headers.values]
    Content-Type = "application/json"
    Cache-Control = "public, max-age=86400"
